name: report

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Generate progress report
        run: python tools/gen_report.py
      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: report
          path: build/report.json
